services:
  api:
    build: .
    ports:
      - "10000:10000"
    environment:
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:10001}
      - DEV=${DEV:-}
      - LOG_FILE=${LOG_FILE:-/app/logs/provessor.log}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
