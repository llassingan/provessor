services:
  api:
    build: .
    ports:
      - "10000:10000"
    environment:
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:10001,http://localhost:8080}
      - DEV=${DEV:-true}
      - API_URL=${API_URL:-http://localhost:10000}
      - LOG_FILE=${LOG_FILE:-/app/logs/provessor.log}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "10001:80"
    depends_on:
      - api
    restart: unless-stopped
